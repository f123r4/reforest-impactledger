[profile.default]
# Projeto único do ReForest+: contratos em contracts/, testes em test/, deploy em script/.
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"

# Otimizações: o tamanho do contrato importa em L2 — Base Sepolia herda o limite
# EIP-170 do mainnet (24.576 bytes). 200 runs é o equilíbrio padrão entre custo de
# deploy (menos runs = menor bytecode) e custo de execução repetida.
optimizer = true
optimizer_runs = 200

# Remappings ajudam tanto o forge quanto o LSP a resolver os imports.
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

verbosity = 3
fuzz = { runs = 256 }

# Foundry bloqueia I/O de filesystem por padrão (segurança). O script de deploy
# precisa escrever deploy/addresses.json — autorizamos só essa pasta.
fs_permissions = [{ access = "read-write", path = "./deploy" }]

[rpc_endpoints]
# URLs são lidas do .env — nunca hard-codar endpoint com API key versionado.
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
